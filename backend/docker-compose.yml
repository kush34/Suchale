version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: social-backend
    restart: unless-stopped

    ports:
      - "${PORT}:${PORT}"

    env_file:
      - .env

    environment:
      PORT: ${PORT}
      MongoDb_URI: mongodb://mongodb:27017/social
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: ${NODE_ENV}

    depends_on:
      - mongodb
      - redis

    volumes:
      - .:/app
      - /app/node_modules

  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data: